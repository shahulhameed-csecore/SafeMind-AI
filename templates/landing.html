<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeMinds</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #050508;
            --neon-blue: #4A90E2;
            --neon-purple: #8b5cf6;
            --text-light: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            /* The light blue "Dribbble-style" outer presentation background */
            background: linear-gradient(135deg, #a8c0ff 0%, #3f2b96 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* The actual Website/App Window */
        .premium-frame {
            width: 95vw;
            height: 90vh;
            background: var(--bg-dark);
            border-radius: 32px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            overflow: hidden;
        }

        /* Ambient Background Glow */
        .glow-sphere {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vh;
            background: radial-gradient(circle, rgba(74, 144, 226, 0.25) 0%, rgba(139, 92, 246, 0.15) 30%, transparent 70%);
            filter: blur(80px);
            z-index: 1;
            animation: pulseGlow 8s infinite alternate ease-in-out;
        }

        @keyframes pulseGlow {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }

        /* Top Navigation */
        nav {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 35px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-light);
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .nav-links li a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links li a:hover { color: var(--text-light); }

        .nav-btn {
            background: transparent;
            color: var(--text-light);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 24px;
            border-radius: 100px;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
        }

        /* Massive Background Text */
        .giant-bg-text {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            text-align: center;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 18vw;
            font-weight: 900;
            color: #4A90E2;
            opacity: 0.9;
            z-index: 2;
            line-height: 0.8;
            letter-spacing: -2px;
            text-shadow: 0 0 40px rgba(74, 144, 226, 0.3);
            pointer-events: none;
        }

        /* Center 3D Object / Robot Hand */
        .hero-image-container {
            position: absolute;
            bottom: -5%;
            left: 50%;
            transform: translateX(-50%);
            height: 85%;
            z-index: 3;
            animation: floatImage 6s ease-in-out infinite;
        }
.hero-image-container img {
            height: 120%;
            object-fit: contain;
            /* Creates a glowing, premium drop shadow that matches the background */
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.8)) drop-shadow(0 0 20px rgba(74, 144, 226, 0.4));
            transition: transform 0.3s ease;
        }

        @keyframes floatImage {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-20px); }
        }

        /* Bottom Hero Content */
        .hero-bottom {
            position: absolute;
            bottom: 50px;
            left: 50px;
            right: 50px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 4;
        }

        .tagline {
            color: var(--text-light);
            font-size: 2rem;
            font-weight: 400;
            line-height: 1.3;
            max-width: 400px;
        }

        .tagline span {
            font-weight: 600;
        }

        .cta-btn {
            background: var(--text-light);
            color: var(--bg-dark);
            padding: 18px 36px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.15);
        }

        .cta-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 40px rgba(255, 255, 255, 0.25);
        }
        /* ==========================================
           📱 MOBILE POLISH (LANDING PAGE)
        ========================================== */
        @media (max-width: 768px) {
            nav { padding: 20px; }
            .nav-links { display: none; } /* Hides the middle links to save space */
            .giant-bg-text { font-size: 24vw; top: 35%; }
            .hero-image-container { height: 60%; bottom: 15%; }
            
            /* Stacks the text and button vertically */
            .hero-bottom {
                flex-direction: column;
                align-items: center;
                text-align: center;
                left: 20px; right: 20px; bottom: 30px;
                gap: 20px;
            }
            .tagline { font-size: 1.6rem; max-width: 100%; }
            .cta-btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="premium-frame">
        <div class="glow-sphere"></div>

        <nav>
            <div class="logo">SafeMinds</div>
          <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#features">Features</a></li>
                <li><a href="#privacy">Privacy & Security</a></li>
                <li><a href="#" style="color: #e17070; font-weight: 600;">Emergency Help</a></li>
            </ul>
            <a href="{{ url_for('login') }}" class="nav-btn">Launch App</a>
        </nav>

        <div class="giant-bg-text">SAFEMINDS</div>

       <div class="hero-image-container">
            <img src="{{ url_for('static', filename='images/robot-hand1.png') }}" alt="SafeMinds AI">
        </div>
        <div class="hero-bottom">
            <h1 class="tagline">Your intelligent <span>shield</span><br>for a safer digital mind.</h1>
            <a href="{{ url_for('register') }}" class="cta-btn">
                Try SafeMinds for free 
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="7 7 17 7 17 17"></polyline></svg>
            </a>
        </div>
    </div>

</body>
</html>
