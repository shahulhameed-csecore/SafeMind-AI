<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SafeMind AI | Emotional Sanctuary</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #03050a;
            --neon-blue: #4A90E2;
            --neon-purple: #8b5cf6;
            --text-light: #f8fafc;
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            --glow-primary: rgba(74, 144, 226, 0.3);
            --glow-secondary: rgba(139, 92, 246, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Ambient Background */
        .bg-gradient {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background: 
                radial-gradient(circle at 15% 50%, rgba(74, 144, 226, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.08), transparent 25%);
            animation: pulseGlow 15s ease-in-out infinite alternate;
        }

        .noise {
            position: fixed; inset: 0; z-index: -1; opacity: 0.03; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Navbar */
        nav {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 20px 5%; display: flex; justify-content: space-between; align-items: center;
            background: rgba(3, 5, 10, 0.7); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border);
            z-index: 1000;
        }

        /* 🚀 PREMIUM LOGO TEXT & GLOW (FIXED FOR VISIBILITY) */
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.6rem; /* Slightly larger text */
            font-weight: 800; /* Bolder text */
            text-transform: uppercase; /* More premium look */
            letter-spacing: 0.5px;
            color: #ffffff; /* Brighter, forced white text */
            
            /* Powerful glow effect on the main text */
            text-shadow: 0 0 15px rgba(255,255,255,0.8), 0 0 30px var(--neon-blue), 0 0 45px var(--glow-primary); 
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .logo:hover {
            color: var(--neon-blue) !important;
            text-shadow: 0 0 20px rgba(255,255,255,1), 0 0 40px var(--neon-blue), 0 0 60px var(--glow-primary); 
            transform: scale(1.03);
        }

        .logo-icon-container {
            width: 40px; height: 40px; 
            border-radius: 12px; 
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(0,0,0,0.3));
            border: 1px solid var(--neon-blue);
            display: flex; justify-content: center; align-items: center;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 0 15px var(--glow-primary);
        }

        .premium-circle-logo {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            object-position: center;
            background: #0a0a0a;
            border: 2px solid var(--neon-blue); /* Updated glowing ring color to blue */
            box-shadow: 0 0 10px rgba(74, 144, 226, 0.4); /* Blue glow */
            padding: 2px;
        }

        .logo-ai {
            color: var(--neon-blue) !important; /* Specific color for AI */
            font-weight: 900;
        }

        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { color: #a1a1aa; text-decoration: none; font-weight: 500; font-size: 0.95rem; transition: color 0.3s; }
        .nav-links a:hover { color: #fff; }

        .nav-btn {
            background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--glass-border); border-top: 1px solid var(--glass-highlight);
            padding: 10px 24px; border-radius: 100px; text-decoration: none; font-weight: 600; font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(10px);
        }
        .nav-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--neon-blue); box-shadow: 0 10px 30px rgba(74, 144, 226, 0.2); transform: translateY(-2px); }

        /* Giant Text */
        .giant-bg-text {
            position: absolute; top: 15vh; left: 50%; transform: translateX(-50%);
            font-family: 'Space Grotesk', sans-serif; font-size: 20vw; font-weight: 900;
            color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,0.03);
            white-space: nowrap; z-index: -1; pointer-events: none; user-select: none;
            letter-spacing: -0.05em;
        }

        /* Hero Image Layout */
        .hero-image-container {
            width: 100%; height: 60vh;
            display: flex; justify(center; align-items: flex-end;
            margin-top: 80px; position: relative;
        }
        
        .hero-image-container img {
            height: 100%; width: auto; object-fit: contain;
            filter: drop-shadow(0 0 40px rgba(74, 144, 226, 0.15));
            animation: float 6s ease-in-out infinite;
        }

        /* Bottom Hero Content */
        .hero-bottom {
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 0 10%; margin-top: -50px; position: relative; z-index: 10;
        }

        .tagline {
            font-size: 3.5rem; font-weight: 700; line-height: 1.1; letter-spacing: -1px;
            color: #fff; text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .tagline span {
            background: linear-gradient(135deg, #fff 0%, #a1a1aa 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .cta-btn {
            display: inline-flex; align-items: center; gap: 12px;
            background: #D4FF00; color: #000; text-decoration: none;
            padding: 18px 36px; border-radius: 100px; font-weight: 700; font-size: 1.1rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 15px 35px rgba(212, 255, 0, 0.2), inset 0 -3px 5px rgba(0,0,0,0.1);
        }
        .cta-btn:hover {
            transform: translateY(-5px); box-shadow: 0 20px 45px rgba(212, 255, 0, 0.4);
            background: #e1ff33;
        }
        .cta-btn svg { transition: transform 0.3s; }
        .cta-btn:hover svg { transform: translateX(5px); }

        /* Trusted By */
        .trusted-by {
            margin-top: 80px; padding: 0 10%; text-align: left;
        }
        .trusted-by p { color: #64748b; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px;}
        .brand-logos { display: flex; gap: 40px; opacity: 0.5; filter: grayscale(100%) contrast(200%); }
        .brand-logos img { height: 30px; width: auto; }

        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-20px); } 100% { transform: translateY(0px); } }

        @media (max-width: 1024px) {
            .hero-bottom { flex-direction: column; align-items: center; text-align: center; gap: 40px; margin-top: 20px;}
            .tagline { font-size: 2.8rem; }
            .trusted-by { text-align: center; }
            .brand-logos { justify-content: center; flex-wrap: wrap; }
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .giant-bg-text { display: none; }
            .tagline { font-size: 2.2rem; }
            .hero-image-container { height: 45vh; margin-top: 100px; }
            .cta-btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    <div class="noise"></div>

    <div class="container">
        <nav>
            <div class="logo">
                <div class="logo-icon-container">
                    <img src="{{ url_for('static', filename='images/logo.png') }}" class="premium-circle-logo" alt="SafeMind Logo">
                </div>
                <span>SafeMind</span> <span class="logo-ai">AI</span>
            </div>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#features">Features</a></li>
                <li><a href="#privacy">Privacy & Security</a></li>
                <li><a href="#" style="color: #ef4444; font-weight: 600; text-shadow: 0 0 10px rgba(239, 68, 68, 0.4);">Emergency Help</a></li>
            </ul>
            <a href="{{ url_for('login') }}" class="nav-btn">Launch App</a>
        </nav>

        <div class="giant-bg-text">SAFEMINDS</div>

        <div class="hero-image-container">
            <img src="{{ url_for('static', filename='images/robot-hand1.png') }}" alt="SafeMinds AI">
        </div>

        <div class="hero-bottom">
            <h1 class="tagline">Your intelligent <span>shield</span><br>for a safer digital mind.</h1>
            <a href="{{ url_for('register') }}" class="cta-btn">
                Try SafeMind for free 
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </a>
        </div>

        <div class="trusted-by">
            <p>Built with enterprise security</p>
            <div class="brand-logos">
                <span style="font-weight: 700; font-size: 1.2rem; display: flex; align-items: center; gap: 8px;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> SOC2 Certified
                </span>
                <span style="font-weight: 700; font-size: 1.2rem; display: flex; align-items: center; gap: 8px;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg> HIPAA Compliant
                </span>
            </div>
        </div>
    </div>

</body>
</html>
